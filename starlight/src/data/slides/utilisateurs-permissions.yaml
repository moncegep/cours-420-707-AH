      type: labeled-stack
      label: Répertoire
      labelColor: green
      items:
        - { text: "r = lister (ls)", color: green }
        - { text: "w = créer/supprimer", color: green }
        - { text: "x = traverser (cd)", color: green }

  octal-stack:
